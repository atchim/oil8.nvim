config:
  # No hard-wrap policy for prose/tables; long links and palette tables
  # legitimately exceed any column cap.
  MD013: false
  # README uses collapsible <details>/<summary> blocks for the palette.
  MD033: false
  # Fenced code blocks live inside those <details> blocks without
  # surrounding blank lines.
  MD031: false
  # Palette code spans are alignment-padded (e.g. `` ` 8   6 -12` ``).
  MD038: false
  # Tables are hand-authored and not pipe-aligned to markdownlint's taste.
  MD060: false
  # The audit doc uses bold lines as lightweight sub-headings.
  MD036: false
