default_install_hook_types:
  - pre-commit
  - commit-msg
# File hooks default to pre-commit so they don't re-run at commit-msg (where
# they'd be handed `.git/COMMIT_EDITMSG`); conventional-pre-commit opts back
# into commit-msg explicitly.
default_stages:
  - pre-commit
repos:
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: []
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-json
      - id: check-merge-conflict
      - id: check-toml
      - id: check-yaml
      - id: end-of-file-fixer
      - id: fix-byte-order-marker
      - id: forbid-submodules
      - id: mixed-line-ending
      - id: trailing-whitespace
        # Preserve two-space Markdown hard line breaks.
        args: [--markdown-linebreak-ext=md]
  - repo: https://github.com/JohnnyMorganz/StyLua
    # `stylua-github` downloads the prebuilt release binary (no cargo build).
    rev: v2.5.2
    hooks:
      - id: stylua-github
  - repo: https://github.com/ComPWA/taplo-pre-commit
    rev: v0.9.3
    hooks:
      - id: taplo-format
      - id: taplo-lint
        args: [--no-schema]
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.23.0
    hooks:
      - id: markdownlint-cli2
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
  - repo: https://github.com/editorconfig-checker/editorconfig-checker.python
    rev: 3.6.1
    hooks:
      - id: editorconfig-checker
        # markdownlint owns Markdown; skip it here to avoid duplicate and
        # conflicting indent/line checks. `.editorconfig-checker.json`
        # disables MaxLineLength (stylua owns Lua width; help files and
        # LuaCATS `---@alias` unions legitimately exceed 79).
        exclude: \.md$
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks
